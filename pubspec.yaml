name: solvro_translator
publish_to: none
environment:
  sdk: ^3.11.1

workspace:
  - packages/solvro_translator_generator
  - packages/solvro_translator_core
  - packages/solvro_translator_with_drift_cache_flutter

dev_dependencies:
  melos: 7.8.1
  solvro_config: ^1.7.0

lint_staged:
  "lib/**.dart": dart format && dart fix --apply
